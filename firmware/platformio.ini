; PoE-powered BLE->Ethernet bridge for a MEATER probe, targeting the
; Olimex ESP32-POE-ISO. Pairs with meater-golang's -bridge flag.
;
; Pinned to espressif32 6.7.0 (Arduino core 2.0.x) deliberately: the Ethernet
; pin map for this board comes from the core's esp32-poe-iso variant header, so
; ETH.begin() needs no magic numbers here.

[env:esp32-poe-iso]
platform = espressif32@6.7.0
board = esp32-poe-iso
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; Arduino + NimBLE + lwIP/Ethernet does not fit the default 1.25MB app slot
; with room to spare; min_spiffs gives ~1.9MB and we have no filesystem needs.
board_build.partitions = min_spiffs.csv

lib_deps =
    h2zero/NimBLE-Arduino@^2.5.0

build_flags =
    -DCORE_DEBUG_LEVEL=1
