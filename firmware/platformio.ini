; BLE->TCP bridge for a MEATER probe. Two boards are supported, sharing all the
; BLE/TCP logic in src/main.cpp and differing only in how they get on the
; network:
;
;   esp32-poe-iso  Olimex ESP32-POE-ISO over PoE Ethernet (default; see the
;                  esp32-poe-iso variant header for the pin map ETH.begin()
;                  relies on).
;   esp32-wifi     A generic ESP32 dev board with no Ethernet hardware, using
;                  WiFiManager's captive portal to collect credentials on
;                  first boot (no secrets committed to source).
;
; Pinned to espressif32 6.7.0 (Arduino core 2.0.x) deliberately: core 3.x
; renamed WiFiServer/WiFi.onEvent to NetworkServer/Network.onEvent, and the
; Ethernet pin map for the PoE board comes from this core's esp32-poe-iso
; variant header.

[platformio]
default_envs = esp32-poe-iso

[env]
platform = espressif32@6.7.0
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; Arduino + NimBLE + lwIP (Ethernet or WiFi) does not fit the default 1.25MB
; app slot with room to spare; min_spiffs gives ~1.9MB and we have no
; filesystem needs.
board_build.partitions = min_spiffs.csv

build_flags =
    -DCORE_DEBUG_LEVEL=1

lib_deps =
    h2zero/NimBLE-Arduino@^2.5.0

[env:esp32-poe-iso]
board = esp32-poe-iso

[env:esp32-wifi]
board = esp32dev
build_flags =
    ${env.build_flags}
    -DBRIDGE_WIFI
lib_deps =
    ${env.lib_deps}
    tzapu/WiFiManager@^2.0.17

